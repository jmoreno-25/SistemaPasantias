<div class="login-container">
  <div class="login-card">
    <h2>Sistema de Pasantías</h2>
    <p class="subtitle">Iniciar Sesión</p>

    <div *ngIf="mensaje" class="alert" [class.alert-error]="esError" [class.alert-success]="!esError">
      {{ mensaje }}
    </div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" [(ngModel)]="email" name="email"
               placeholder="correo@ejemplo.com" required />
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" [(ngModel)]="contrasena" name="contrasena"
               placeholder="••••••" required />
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="cargando">
        {{ cargando ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

    <p class="link-registro">
      ¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a>
    </p>
  </div>
</div>
